<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  background:black;
}

img{
  width:100%;
  height:100vh;
  object-fit:cover;
  cursor:pointer;
}
</style>
</head>
<body>

<img id="img" src="1.jpg">

<script>

const images = [
  "2.jpg",
  "3.jpg",
  "4.jpg",
  "1.jpg"
];

const ads = [
  "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
  "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4",
  "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
  "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4"
];

let i = 0;

document.getElementById("img").addEventListener("click", () => {

  // 1️⃣ Open next image in NEW TAB
  window.open(images[i], "_blank");

  // 2️⃣ Current tab goes to AD
  window.location.href = ads[i];

  i++;
  if(i >= images.length) i = 0;

});

</script>

</body>
</html>
