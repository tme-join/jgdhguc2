<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .full-img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      cursor: pointer;
      background: black;
    }
  </style>
</head>

<body>

  <img 
    src="1.jpg" 
    class="full-img"
    id="landingImage"
  />

  <script>
    const newLandingPageURL = "https://example.com/new-page";
    const adURL = "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868";

    let done = false;

    function redirectAll() {
      if (done) return;
      done = true;

      // নতুন ট্যাবে ল্যান্ডিং পেজ
      window.open(newLandingPageURL, "_blank");

      // বর্তমান ট্যাবে অ্যাড
      window.location.href = adURL;
    }

    // ক্লিক করলে সাথে সাথে
    document.getElementById("landingImage").addEventListener("click", redirectAll);

    // ৩ সেকেন্ড পরে অটো
    setTimeout(openLanding, 3000);
  </script>

</body>
  </html>
