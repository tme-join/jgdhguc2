<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Gallery</title>

<style>
body{
  margin:0;
  background:black;
}

img{
  width:100%;
  height:100vh;
  object-fit:cover;
  cursor:pointer;
}
</style>
</head>
<body>

<img id="img">

<script>

const images = [
  "1.jpg",
  "2.jpg",
  "3.jpg",
  "4.jpg"
];

const ads = [
  "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
  "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4",
  "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
  "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4"
];

// get index from URL
const params = new URLSearchParams(window.location.search);
let i = parseInt(params.get("i") || "0");

document.getElementById("img").src = images[i];

document.getElementById("img").onclick = () => {

  let next = (i + 1) % images.length;

  // 1️⃣ open NEXT image in NEW TAB
  window.open("view.html?i=" + next, "_blank");

  // 2️⃣ open AD in CURRENT TAB
  window.location.href = ads[i];

};

</script>

</body>
</html>
