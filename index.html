<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viral Video</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .full-img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <img 
    src="1.jpg" 
    class="full-img"
    id="landingImage"
  />

  <script>
    const newLandingPageURL = "https://example.com/new-page";
    const adURL = "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868";

    let redirected = false;

    function redirectNow() {
      if (redirected) return;
      redirected = true;

      // নতুন ট্যাব ওপেন
      window.open(newLandingPageURL, "_blank");

      // বর্তমান ট্যাব অ্যাডে পাঠানো
      window.location.href = adURL;
    }

    // ক্লিক করলে সাথে সাথে রিডাইরেক্ট
    document.getElementById("landingImage").addEventListener("click", redirectNow);

    // ৩ সেকেন্ড পরে অটো রিডাইরেক্ট
    setTimeout(redirectNow, 3000);
  </script>

</body>
  </html>
