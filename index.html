<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
}

#img{
  width:100%;
  height:100vh;
  object-fit:cover;
  cursor:pointer;
}
</style>
</head>
<body>

<img id="img" src="1.jpg">

<script>

const images = [
  "1.jpg",
  "2.jpg",
  "3.jpg",
  "4.jpg"
];

const adLinks = [
  "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
  "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4",
  "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868",
  "https://seenimplieddump.com/v3a38gvf?key=6c21c7841863a8a4041248cb754691b4"
];

let i = 0;

document.getElementById("img").addEventListener("click", () => {

  // sponsor/ad page
  window.open(adLinks[i], "_blank");

  // next image
  i++;

  if(i >= images.length){
    i = 0;
  }

  document.getElementById("img").src = images[i];

});

</script>

</body>
</html>
